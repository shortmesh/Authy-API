definitions:
  otp.ErrorResponse:
    properties:
      error:
        example: message
        type: string
    type: object
  otp.GenerateOTPRequest:
    properties:
      identifier:
        example: "237123456780"
        type: string
      platform:
        example: wa
        type: string
      sender:
        example: "237123456789"
        type: string
    required:
    - identifier
    - platform
    - sender
    type: object
  otp.GenerateOTPResponse:
    properties:
      expires_at:
        example: "2026-02-19T20:30:00Z"
        type: string
      message:
        example: OTP sent successfully
        type: string
    type: object
  otp.VerifyOTPRequest:
    properties:
      code:
        example: "123456"
        type: string
      identifier:
        example: "237123456780"
        type: string
      platform:
        example: wa
        type: string
      sender:
        example: "237123456789"
        type: string
    required:
    - code
    - identifier
    - platform
    - sender
    type: object
  otp.VerifyOTPResponse:
    properties:
      message:
        example: OTP verified successfully
        type: string
    type: object
  platforms.ErrorResponse:
    properties:
      error:
        example: message
        type: string
    type: object
  platforms.Platform:
    properties:
      platform:
        example: wa
        type: string
      sender:
        example: "237123456789"
        type: string
    type: object
  users.CreateUserRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: Validpassword123@!
        maxLength: 64
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  users.ErrorResponse:
    properties:
      error:
        example: message
        type: string
    type: object
  users.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: Validpassword123@!
        type: string
    required:
    - email
    - password
    type: object
  users.UserResponse:
    properties:
      client_id:
        example: CYDD4YLEmwQ3TCiSFidaFQ==
        type: string
      client_secret:
        example: ux5Wa2P790vyHTzeaKWQkpfUb0BNGA7qQkz5JnH4k-Y=
        type: string
      message:
        example: User created successfully
        type: string
    type: object
info:
  contact: {}
  description: API for Authy service
  title: Authy API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/users.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/users.UserResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/users.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/users.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/users.ErrorResponse'
      summary: User login
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account.
      parameters:
      - description: User creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/users.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/users.UserResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/users.ErrorResponse'
        "409":
          description: User with email already exists
          schema:
            $ref: '#/definitions/users.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/users.ErrorResponse'
      summary: Create a new user
      tags:
      - auth
  /api/v1/otp/generate:
    post:
      consumes:
      - application/json
      description: Generate a secure OTP code and send it to the specified identifier
        via the interface API
      parameters:
      - description: OTP generation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/otp.GenerateOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP sent successfully
          schema:
            $ref: '#/definitions/otp.GenerateOTPResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Generate and send OTP
      tags:
      - otp
  /api/v1/otp/verify:
    post:
      consumes:
      - application/json
      description: Verify an OTP code for the authenticated user
      parameters:
      - description: OTP verification request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/otp.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP verified successfully
          schema:
            $ref: '#/definitions/otp.VerifyOTPResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "429":
          description: TooManyRequests
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Verify OTP
      tags:
      - otp
  /api/v1/platforms:
    get:
      consumes:
      - application/json
      description: List all available platforms and their senders
      produces:
      - application/json
      responses:
        "200":
          description: List of platforms retrieved successfully
          schema:
            items:
              $ref: '#/definitions/platforms.Platform'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/platforms.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/platforms.ErrorResponse'
      security:
      - BasicAuth: []
      summary: List available platforms
      tags:
      - platforms
securityDefinitions:
  BasicAuth:
    type: basic
swagger: "2.0"
