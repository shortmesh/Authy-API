definitions:
  otp.ErrorResponse:
    properties:
      error:
        example: message
        type: string
    type: object
  otp.GenerateOTPRequest:
    properties:
      phone_number:
        example: "+237123456780"
        type: string
      platform:
        example: wa
        type: string
    required:
    - phone_number
    - platform
    type: object
  otp.GenerateOTPResponse:
    properties:
      expires_at:
        example: "2026-02-19T20:30:00Z"
        type: string
      message:
        example: OTP sent successfully
        type: string
    type: object
  otp.VerifyOTPRequest:
    properties:
      code:
        example: "123456"
        type: string
      phone_number:
        example: "+237123456780"
        type: string
      platform:
        example: wa
        type: string
    required:
    - code
    - phone_number
    - platform
    type: object
  otp.VerifyOTPResponse:
    properties:
      message:
        example: OTP verified successfully
        type: string
    type: object
  platforms.ErrorResponse:
    properties:
      error:
        example: message
        type: string
    type: object
info:
  contact: {}
  description: API for Authy service
  title: Authy API
  version: "1.0"
paths:
  /api/v1/otp/generate:
    post:
      consumes:
      - application/json
      description: Generate a secure OTP code and send it to the specified phone number
        via the interface API
      parameters:
      - description: OTP generation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/otp.GenerateOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP sent successfully
          schema:
            $ref: '#/definitions/otp.GenerateOTPResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
      summary: Generate and send OTP
      tags:
      - otp
  /api/v1/otp/verify:
    post:
      consumes:
      - application/json
      description: Verify an OTP code
      parameters:
      - description: OTP verification request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/otp.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP verified successfully
          schema:
            $ref: '#/definitions/otp.VerifyOTPResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "429":
          description: TooManyRequests
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/otp.ErrorResponse'
      summary: Verify OTP
      tags:
      - otp
  /api/v1/platforms:
    get:
      consumes:
      - application/json
      description: List all unique available platforms
      produces:
      - application/json
      responses:
        "200":
          description: List of platforms retrieved successfully
          schema:
            items:
              type: string
            type: array
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/platforms.ErrorResponse'
      summary: List available platforms
      tags:
      - platforms
swagger: "2.0"
